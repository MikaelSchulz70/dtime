spring:
  devtools:
    add-properties: true
  datasource:
    url: jdbc:postgresql://localhost:5432/dtime
    username: postgres
    password: change_me
  liquibase:
    url: jdbc:postgresql://localhost:5432/dtime
    user: postgres
    password: change_me
  jpa:
    hibernate:
      ddl-auto: validate
  # Mail Configuration (disabled for development)
  mail:
    host: localhost
    port: 587
    debug: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Server Configuration for Development (HTTPS enabled)
# Default local ports (avoid clashes): backend 8443 here; frontend dev https://localhost:3000; MCP http://localhost:8081 (SERVER_PORT).
server:
  port: 8443
  address: 0.0.0.0
  ssl:
    key-store-type: PKCS12
    key-store: classpath:keystore/dtime_new.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:dt2020}
    key-alias: dtime
  servlet:
    session:
      cookie:
        domain: localhost
        path: /

# Security Configuration (disabled for development)
security:
  enable-csrf: false

# Local Authentik OIDC defaults for development
oauth:
  authentik:
    enabled: true
    client-id: sPiKspX0VVag2RIrtYh1p9WecpIhLrFv9IfxGY9I
    client-secret: ${OAUTH_AUTHENTIK_CLIENT_SECRET:}
    authorization-uri: http://localhost:9000/application/o/authorize/
    end-session-uri: http://localhost:9000/application/o/dtime/end-session/
    token-uri: http://localhost:9000/application/o/token/
    user-info-uri: http://localhost:9000/application/o/userinfo/
    jwk-set-uri: http://localhost:9000/application/o/dtime/jwks/
    machine-jwt:
      # Bearer JWT for dtime-mcp (Authentik provider slug dtmcp — separate from browser provider dtime).
      enabled: ${OAUTH_AUTHENTIK_MACHINE_JWT_ENABLED:true}
      jwk-set-uri: ${OAUTH_AUTHENTIK_MACHINE_JWT_JWK_SET_URI:http://localhost:9000/application/o/dtmcp/jwks/}
      # Overridden by OAUTH_AUTHENTIK_MACHINE_JWT_AUTHORIZED_CLIENT_IDS when set (see .env.example).
      authorized-client-ids:
        - ncFDhaBcHjh5jzwUdrmxzj08oDDuMSivl2Ai5Mvi

# Frontend Development Server Configuration
app:
  frontend:
    dev-server:
      enabled: true
      url: https://localhost:3000

# Email Configuration (disabled for development)
mail:
  enabled: false
  username: dev@example.com
  password: dev-password

# Logging Configuration
logging:
  file:
    name: ./logs/server.log
  level:
    org.springframework.security: DEBUG