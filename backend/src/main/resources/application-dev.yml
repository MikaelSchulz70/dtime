spring:
  devtools:
    add-properties: true
  datasource:
    url: jdbc:postgresql://localhost:5432/dtime
    username: postgres
    password: change_me
  liquibase:
    url: jdbc:postgresql://localhost:5432/dtime
    user: postgres
    password: change_me
  jpa:
    hibernate:
      ddl-auto: validate
  # Mail Configuration (disabled for development)
  mail:
    host: localhost
    port: 587
    debug: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Server Configuration for Development (HTTPS enabled)
# Default local ports (avoid clashes): backend 8443 here; frontend dev https://localhost:3000; MCP http://localhost:8081 (SERVER_PORT).
server:
  port: 8443
  address: 0.0.0.0
  ssl:
    key-store-type: PKCS12
    key-store: classpath:keystore/dtime_new.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:dt2020}
    key-alias: dtime
  servlet:
    session:
      cookie:
        domain: localhost
        path: /

# Security Configuration (disabled for development)
security:
  enable-csrf: false

# Local Authentik OIDC — set client id/secret and machine JWT allowlist via .env (see .env.example).
oauth:
  authentik:
    enabled: ${OAUTH_AUTHENTIK_ENABLED:true}
    client-id: ${OAUTH_AUTHENTIK_CLIENT_ID:}
    client-secret: ${OAUTH_AUTHENTIK_CLIENT_SECRET:}
    authorization-uri: ${OAUTH_AUTHENTIK_AUTHORIZATION_URI:http://localhost:9000/application/o/authorize/}
    end-session-uri: ${OAUTH_AUTHENTIK_END_SESSION_URI:http://localhost:9000/application/o/dtime/end-session/}
    token-uri: ${OAUTH_AUTHENTIK_TOKEN_URI:http://localhost:9000/application/o/token/}
    user-info-uri: ${OAUTH_AUTHENTIK_USER_INFO_URI:http://localhost:9000/application/o/userinfo/}
    jwk-set-uri: ${OAUTH_AUTHENTIK_JWK_SET_URI:http://localhost:9000/application/o/dtime/jwks/}
    machine-jwt:
      enabled: ${OAUTH_AUTHENTIK_MACHINE_JWT_ENABLED:true}
      jwk-set-uri: ${OAUTH_AUTHENTIK_MACHINE_JWT_JWK_SET_URI:http://localhost:9000/application/o/dtmcp/jwks/}
      # Allowlist: OAUTH_AUTHENTIK_MACHINE_JWT_AUTHORIZED_CLIENT_IDS, YAML list below, or (if both empty) MCP_OAUTH_CLIENT_ID.
      authorized-client-ids: []

# Frontend Development Server Configuration
app:
  frontend:
    dev-server:
      enabled: true
      url: https://localhost:3000

# Email Configuration (disabled for development)
mail:
  enabled: false
  username: dev@example.com
  password: dev-password

# Logging Configuration
logging:
  file:
    name: ./logs/server.log
  level:
    org.springframework.security: DEBUG