version: '3.8'

# Typical host port binding (defaults below). Keep MCP off 8443 / 3000 / 8080 to avoid clashes:
#   Backend (HTTPS): https://localhost:8443 — application-dev.yml + application-docker.yml (server.port: 8443)
#   Backend prod profile may also bind HTTP on 8080 internally (application-prod.yml); compose only publishes 8443.
#   Frontend dev: https://localhost:3000 — webpack FRONTEND_PORT (default 3000)
#   Frontend prod compose: localhost:3000 → nginx:80 inside container (no MCP overlap)
#   MCP: http://localhost:8081 (default SERVER_PORT/MCP_PORT; distinct from backend 8443 and frontend 3000)

services:
  # PostgreSQL Database
  dtime-db:
    extends:
      file: ./infra/postgres/docker-compose.yml
      service: postgres

  # Spring Boot Backend (optional - for full stack development)
  dtime-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dtime-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DATABASE_URL: jdbc:postgresql://dtime-db:5432/${DATABASE_NAME:-dtime}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-change_me}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SECURITY_CSRF_ENABLED: ${SECURITY_CSRF_ENABLED:-false}
      OAUTH_AUTHENTIK_ENABLED: ${OAUTH_AUTHENTIK_ENABLED:-false}
      OAUTH_AUTHENTIK_CLIENT_ID: ${OAUTH_AUTHENTIK_CLIENT_ID}
      OAUTH_AUTHENTIK_CLIENT_SECRET: ${OAUTH_AUTHENTIK_CLIENT_SECRET}
      OAUTH_AUTHENTIK_AUTHORIZATION_URI: ${OAUTH_AUTHENTIK_AUTHORIZATION_URI}
      OAUTH_AUTHENTIK_END_SESSION_URI: ${OAUTH_AUTHENTIK_END_SESSION_URI:-}
      OAUTH_AUTHENTIK_FULL_LOGOUT_FLOW_URI: ${OAUTH_AUTHENTIK_FULL_LOGOUT_FLOW_URI:-}
      OAUTH_AUTHENTIK_REQUIRE_APP_ROLE: ${OAUTH_AUTHENTIK_REQUIRE_APP_ROLE:-true}
      OAUTH_AUTHENTIK_SWITCH_USER_RETURN_BASE_URL: ${OAUTH_AUTHENTIK_SWITCH_USER_RETURN_BASE_URL:-}
      OAUTH_AUTHENTIK_TOKEN_URI: ${OAUTH_AUTHENTIK_TOKEN_URI}
      OAUTH_AUTHENTIK_USER_INFO_URI: ${OAUTH_AUTHENTIK_USER_INFO_URI}
      OAUTH_AUTHENTIK_JWK_SET_URI: ${OAUTH_AUTHENTIK_JWK_SET_URI}
      OAUTH_AUTHENTIK_MACHINE_JWT_ENABLED: ${OAUTH_AUTHENTIK_MACHINE_JWT_ENABLED:-false}
      OAUTH_AUTHENTIK_MACHINE_JWT_JWK_SET_URI: ${OAUTH_AUTHENTIK_MACHINE_JWT_JWK_SET_URI:-}
      OAUTH_AUTHENTIK_MACHINE_JWT_AUTHORIZED_CLIENT_IDS: ${OAUTH_AUTHENTIK_MACHINE_JWT_AUTHORIZED_CLIENT_IDS:-}
      SSL_KEYSTORE_PASSWORD: ${SSL_KEYSTORE_PASSWORD:-dt2020}
    ports:
      - "8443:8443"
    depends_on:
      dtime-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:8443/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    profiles:
      - full-stack
      - mcp

  # Frontend Development Server (optional)
  dtime-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dtime-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      REACT_APP_BACKEND_URL: ${FRONTEND_BACKEND_URL:-https://localhost:8443}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
    depends_on:
      - dtime-backend
    profiles:
      - full-stack

  # Frontend Production Server
  dtime-frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dtime-frontend-prod
    restart: unless-stopped
    environment:
      REACT_APP_BACKEND_URL: ${FRONTEND_BACKEND_URL:-https://localhost:8443}
      NODE_ENV: production
    ports:
      - "3000:80"
    depends_on:
      - dtime-backend
    profiles:
      - production

  # MCP Server (Model Context Protocol)
  dtime-mcp:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: dtime-mcp
    restart: unless-stopped
    environment:
      # docker profile: defaults in mcp/src/main/resources/application.yml (dtime-backend + host.docker.internal Authentik)
      SPRING_PROFILES_ACTIVE: ${MCP_SPRING_PROFILES_ACTIVE:-docker,prod}
      SERVER_PORT: ${MCP_PORT:-8081}
      MCP_BACKEND_URL: ${MCP_BACKEND_URL:-https://dtime-backend:8443}
      # Do not inherit OAUTH_AUTHENTIK_TOKEN_URI here: host .env often uses localhost:9000 (OK for backend on host);
      # inside this container localhost is wrong for Authentik on the host—override explicitly if needed.
      MCP_OAUTH_TOKEN_URI: ${MCP_OAUTH_TOKEN_URI:-http://host.docker.internal:9000/application/o/token/}
      MCP_OAUTH_CLIENT_ID: ${MCP_OAUTH_CLIENT_ID:-}
      MCP_OAUTH_CLIENT_SECRET: ${MCP_OAUTH_CLIENT_SECRET:-}
      MCP_OAUTH_SCOPE: ${MCP_OAUTH_SCOPE:-}
      MCP_VALIDATE_ON_STARTUP: ${MCP_VALIDATE_ON_STARTUP:-true}
      JAVA_OPTS: ${MCP_JAVA_OPTS:--Xmx512m -Xms256m}
    ports:
      - "${MCP_PORT:-8081}:${MCP_PORT:-8081}"
    depends_on:
      dtime-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf \"http://127.0.0.1:$${SERVER_PORT}/actuator/health\" >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    profiles:
      - full-stack
      - mcp

volumes:
  postgres_data:
    driver: local